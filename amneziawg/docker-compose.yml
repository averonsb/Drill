volumes:
  etc_wireguard:

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    restart: unless-stopped
    environment:
      - DISABLE_IPV6=true
      - EXPERIMENTAL_AWG=true
      - WG_HOST=${WG_HOST}
      - INIT_HOST=${INIT_HOST}
      - INIT_PASSWORD=${INIT_PASSWORD}
    env_file:
      - .env

    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro

    ports:
      - "${WG_PORT:-51820}:51820/udp"
      - "${WEB_BIND:-127.0.0.1}:${WEB_UI_PORT:-51821}:51821/tcp"

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    networks:
      wg:
        ipv4_address: "${DOCKER_CONTAINER_IP_V4:-10.42.42.42}"
    devices:
      - /dev/net/tun:/dev/net/tun

networks:
  wg:
    driver: bridge
    ipam:
      config:
        - subnet: "${DOCKER_NET_V4:-10.42.42.0/24}"
